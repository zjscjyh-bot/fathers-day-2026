<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>父亲节快乐 · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Ma+Shan+Zheng&family=DM+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- 噪点纹理叠加层 -->
<div class="grain"></div>

<!-- 鼠标光晕跟随 -->
<div class="cursor-glow" id="cursorGlow"></div>

<!-- 背景画布：粒子 -->
<canvas class="particles" id="particles"></canvas>

<!-- 背景装饰光环 -->
<div class="bg-rings">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- 背景暖阳 -->
<div class="bg-sun"></div>

<!-- 流动渐变层 -->
<div class="bg-aurora"></div>

<!-- 顶部细信息 -->
<div class="meta meta--tl">06 · 21 · 2026</div>
<div class="meta meta--tr">FATHER'S DAY</div>
<div class="meta meta--bl">No. 21</div>
<div class="meta meta--br">A quiet note</div>

<!-- 主体 -->
<main class="stage">

  <!-- 装饰边角 -->
  <span class="corner corner--tl"></span>
  <span class="corner corner--tr"></span>
  <span class="corner corner--bl"></span>
  <span class="corner corner--br"></span>

  <!-- 副标 -->
  <p class="eyebrow" id="eyebrow">
    <span class="eyebrow__line"></span>
    <span class="eyebrow__text">2026 · 六月第三个星期日</span>
    <span class="eyebrow__line"></span>
  </p>

  <!-- 主标题：父亲节快乐 -->
  <h1 class="title" id="title">
    <span class="title__char" style="--i:0">父</span>
    <span class="title__char" style="--i:1">亲</span>
    <span class="title__char" style="--i:2">节</span>
    <span class="title__char title__char--accent" style="--i:3">快</span>
    <span class="title__char" style="--i:4">乐</span>
  </h1>

  <!-- 标题下的装饰线 -->
  <div class="underline" id="underline">
    <span></span><span></span><span></span>
  </div>

  <!-- 心跳脉冲 -->
  <div class="pulse-ring" id="pulseRing"></div>

</main>

<script src="script.js"></script>
</body>
</html>
